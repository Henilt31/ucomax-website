<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    
    <defs>
      <!-- Background Gradients -->
      <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#fafbfc"/>
        <stop offset="100%" stop-color="#f1f5f9"/>
      </linearGradient>
      <linearGradient id="grid-grad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#cbd5e1" stop-opacity="0.2"/>
      </linearGradient>
      
      <!-- General Metal Gradients -->
      <linearGradient id="metal-body" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#475569"/>
        <stop offset="25%" stop-color="#64748b"/>
        <stop offset="50%" stop-color="#94a3b8"/>
        <stop offset="75%" stop-color="#64748b"/>
        <stop offset="100%" stop-color="#334155"/>
      </linearGradient>
      <linearGradient id="steel-block" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#cbd5e1"/>
        <stop offset="50%" stop-color="#94a3b8"/>
        <stop offset="100%" stop-color="#475569"/>
      </linearGradient>
      <linearGradient id="brass-block" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#fef08a"/>
        <stop offset="50%" stop-color="#eab308"/>
        <stop offset="100%" stop-color="#ca8a04"/>
      </linearGradient>
      <linearGradient id="gold-metal" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#fef08a"/>
        <stop offset="50%" stop-color="#eab308"/>
        <stop offset="100%" stop-color="#a16207"/>
      </linearGradient>
      
      <!-- Glow Filters -->
      <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="8" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
      <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
        <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.15" />
      </filter>
      
      <!-- Tech Grid Pattern -->
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="url(#grid-grad)" stroke-width="0.75" />
        <circle cx="40" cy="40" r="1" fill="#cbd5e1" opacity="0.5" />
      </pattern>
    </defs>
    
    <!-- Workbench Canvas -->
    <rect width="800" height="600" fill="url(#bg-grad)" />
    <rect width="800" height="600" fill="url(#grid)" />
    
    <!-- Outer Technical Frame -->
    <rect x="20" y="20" width="760" height="560" rx="12" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="10 5" opacity="0.6"/>
    
    <!-- CAD Labels -->
    <text x="40" y="45" font-family="'Rajdhani', sans-serif" font-size="12" font-weight="bold" fill="#1a3a5c" letter-spacing="2">UCOMAX ENGINEERING SOLUTIONS</text>
    <text x="40" y="565" font-family="monospace" font-size="10" fill="#64748b">SCALE: N.T.S. | TECHNICAL SCHEMATIC</text>
    <text x="760" y="45" font-family="monospace" font-size="10" fill="#e8421a" font-weight="bold" text-anchor="end">SYS_STATUS: ACTIVE</text>
    <text x="760" y="565" font-family="monospace" font-size="10" fill="#64748b" text-anchor="end">ID: HIGH-TEMPERATURE-WEDGES-UPTO-150-C</text>
    
    <!-- Product Heading Overlay -->
    <text x="40" y="80" font-family="'Rajdhani', sans-serif" font-size="28" font-weight="bold" fill="#1e293b">High Temperature Wedges upto 150°C</text>
    <text x="40" y="102" font-family="sans-serif" font-size="11" font-weight="bold" fill="#e8421a" letter-spacing="1.5">NDT PRODUCTS • HIGH-TEMPERATURE-WEDGES-UPTO-150-C</text>
  
    
    <g transform="translate(150, 80)" filter="url(#soft-shadow)">
      <!-- Specimen base -->
      <rect x="0" y="300" width="500" height="120" fill="url(#steel-block)" stroke="#334155" stroke-width="2"/>
      <path d="M 350 300 L 330 350 L 340 420" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="2 2"/>
      
      <!-- Wedge body -->
      <path d="M 50 300 L 250 300 L 180 150 L 50 150 Z" fill="#f59e0b" fill-opacity="0.35" stroke="#0284c7" stroke-width="2.5"/>

      <!-- Sound beams -->
      <line x1="115" y1="150" x2="160" y2="300" stroke="#f59e0b" stroke-width="3"/>
      <line x1="160" y1="300" x2="246.60254037844385" y2="350" stroke="#ef4444" stroke-width="4" filter="url(#glow)"/>

      <!-- Transducer -->
      <rect x="70" y="100" width="90" height="60" rx="3" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
      <rect x="50" y="115" width="100" height="20" rx="3" fill="#ef4444"/><text x="100" y="129" font-family="monospace" font-size="9" font-weight="bold" fill="#ffffff" text-anchor="middle">MAX TEMP: 150°C</text>
    </g>

    <!-- Annotations -->
    <g font-family="monospace" font-size="10" fill="#475569">
      <line x1="280" y1="210" x2="350" y2="160" stroke="#94a3b8" stroke-width="1"/>
      <circle cx="280" cy="210" r="3" fill="#e8421a"/>
      <text x="360" y="155">MATERIAL: High-Temp Polyimide (Ultem)</text>

      <line x1="480" y1="430" x2="420" y2="500" stroke="#94a3b8" stroke-width="1"/>
      <circle cx="480" cy="430" r="3" fill="#e8421a"/>
      <text x="410" y="515" text-anchor="middle">ANGLE: 60° Refracted</text>
    </g>
  </svg>