<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    
    <defs>
      <!-- Background Gradients -->
      <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#fafbfc"/>
        <stop offset="100%" stop-color="#f1f5f9"/>
      </linearGradient>
      <linearGradient id="grid-grad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#cbd5e1" stop-opacity="0.2"/>
      </linearGradient>
      
      <!-- General Metal Gradients -->
      <linearGradient id="metal-body" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#475569"/>
        <stop offset="25%" stop-color="#64748b"/>
        <stop offset="50%" stop-color="#94a3b8"/>
        <stop offset="75%" stop-color="#64748b"/>
        <stop offset="100%" stop-color="#334155"/>
      </linearGradient>
      <linearGradient id="steel-block" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#cbd5e1"/>
        <stop offset="50%" stop-color="#94a3b8"/>
        <stop offset="100%" stop-color="#475569"/>
      </linearGradient>
      <linearGradient id="brass-block" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#fef08a"/>
        <stop offset="50%" stop-color="#eab308"/>
        <stop offset="100%" stop-color="#ca8a04"/>
      </linearGradient>
      <linearGradient id="gold-metal" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#fef08a"/>
        <stop offset="50%" stop-color="#eab308"/>
        <stop offset="100%" stop-color="#a16207"/>
      </linearGradient>
      
      <!-- Glow Filters -->
      <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="8" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
      <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
        <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.15" />
      </filter>
      
      <!-- Tech Grid Pattern -->
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="url(#grid-grad)" stroke-width="0.75" />
        <circle cx="40" cy="40" r="1" fill="#cbd5e1" opacity="0.5" />
      </pattern>
    </defs>
    
    <!-- Workbench Canvas -->
    <rect width="800" height="600" fill="url(#bg-grad)" />
    <rect width="800" height="600" fill="url(#grid)" />
    
    <!-- Outer Technical Frame -->
    <rect x="20" y="20" width="760" height="560" rx="12" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="10 5" opacity="0.6"/>
    
    <!-- CAD Labels -->
    <text x="40" y="45" font-family="'Rajdhani', sans-serif" font-size="12" font-weight="bold" fill="#1a3a5c" letter-spacing="2">UCOMAX ENGINEERING SOLUTIONS</text>
    <text x="40" y="565" font-family="monospace" font-size="10" fill="#64748b">SCALE: N.T.S. | TECHNICAL SCHEMATIC</text>
    <text x="760" y="45" font-family="monospace" font-size="10" fill="#e8421a" font-weight="bold" text-anchor="end">SYS_STATUS: ACTIVE</text>
    <text x="760" y="565" font-family="monospace" font-size="10" fill="#64748b" text-anchor="end">ID: UCO-FLEX-SCANNER</text>
    
    <!-- Product Heading Overlay -->
    <text x="40" y="80" font-family="'Rajdhani', sans-serif" font-size="28" font-weight="bold" fill="#1e293b">UCO Flex Scanner</text>
    <text x="40" y="102" font-family="sans-serif" font-size="11" font-weight="bold" fill="#e8421a" letter-spacing="1.5">NDT PRODUCTS • UCO-FLEX-SCANNER</text>
  
    
    <g transform="translate(100, 80)" filter="url(#soft-shadow)">
      <path d="M 0 350 Q 300 280 600 350" fill="none" stroke="#64748b" stroke-width="12"/>
      <rect x="150" y="180" width="300" height="30" rx="4" fill="url(#metal-body)" stroke="#1e293b" stroke-width="2"/>
      <rect x="130" y="160" width="20" height="70" rx="3" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
      <rect x="450" y="160" width="20" height="70" rx="3" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
      
      <path d="M 100 210 L 140 180 L 180 200 L 220 180 L 260 210 L 300 190 L 340 210" fill="none" stroke="#e8421a" stroke-width="8" stroke-linecap="round"/>
      <circle cx="100" cy="210" r="6" fill="#1e293b"/>
      <circle cx="140" cy="180" r="6" fill="#1e293b"/>
      <circle cx="180" cy="200" r="6" fill="#1e293b"/>
      <circle cx="220" cy="180" r="6" fill="#1e293b"/>
      <circle cx="260" cy="210" r="6" fill="#1e293b"/>
      <circle cx="300" cy="190" r="6" fill="#1e293b"/>
      <circle cx="340" cy="210" r="6" fill="#1e293b"/>
      <text x="220" y="150" font-family="sans-serif" font-size="10" fill="#e8421a" text-anchor="middle">FLEXIBLE LINK BAND</text>
    
      <g transform="translate(240, 195)">
        <rect x="-10" y="0" width="20" height="70" fill="url(#metal-body)" stroke="#1e293b"/>
        <rect x="-15" y="70" width="30" height="40" rx="2" fill="#ef4444" stroke="#b91c1c"/>
      </g>
    </g>
  </svg>