<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    
    <defs>
      <!-- Background Gradients -->
      <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#fafbfc"/>
        <stop offset="100%" stop-color="#f1f5f9"/>
      </linearGradient>
      <linearGradient id="grid-grad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#cbd5e1" stop-opacity="0.2"/>
      </linearGradient>
      
      <!-- General Metal Gradients -->
      <linearGradient id="metal-body" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#475569"/>
        <stop offset="25%" stop-color="#64748b"/>
        <stop offset="50%" stop-color="#94a3b8"/>
        <stop offset="75%" stop-color="#64748b"/>
        <stop offset="100%" stop-color="#334155"/>
      </linearGradient>
      <linearGradient id="steel-block" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#cbd5e1"/>
        <stop offset="50%" stop-color="#94a3b8"/>
        <stop offset="100%" stop-color="#475569"/>
      </linearGradient>
      <linearGradient id="brass-block" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#fef08a"/>
        <stop offset="50%" stop-color="#eab308"/>
        <stop offset="100%" stop-color="#ca8a04"/>
      </linearGradient>
      <linearGradient id="gold-metal" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#fef08a"/>
        <stop offset="50%" stop-color="#eab308"/>
        <stop offset="100%" stop-color="#a16207"/>
      </linearGradient>
      
      <!-- Glow Filters -->
      <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="8" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
      <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
        <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.15" />
      </filter>
      
      <!-- Tech Grid Pattern -->
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="url(#grid-grad)" stroke-width="0.75" />
        <circle cx="40" cy="40" r="1" fill="#cbd5e1" opacity="0.5" />
      </pattern>
    </defs>
    
    <!-- Workbench Canvas -->
    <rect width="800" height="600" fill="url(#bg-grad)" />
    <rect width="800" height="600" fill="url(#grid)" />
    
    <!-- Outer Technical Frame -->
    <rect x="20" y="20" width="760" height="560" rx="12" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="10 5" opacity="0.6"/>
    
    <!-- CAD Labels -->
    <text x="40" y="45" font-family="'Rajdhani', sans-serif" font-size="12" font-weight="bold" fill="#1a3a5c" letter-spacing="2">UCOMAX ENGINEERING SOLUTIONS</text>
    <text x="40" y="565" font-family="monospace" font-size="10" fill="#64748b">SCALE: N.T.S. | TECHNICAL SCHEMATIC</text>
    <text x="760" y="45" font-family="monospace" font-size="10" fill="#e8421a" font-weight="bold" text-anchor="end">SYS_STATUS: ACTIVE</text>
    <text x="760" y="565" font-family="monospace" font-size="10" fill="#64748b" text-anchor="end">ID: UV-LIGHTS</text>
    
    <!-- Product Heading Overlay -->
    <text x="40" y="80" font-family="'Rajdhani', sans-serif" font-size="28" font-weight="bold" fill="#1e293b">UV Lights</text>
    <text x="40" y="102" font-family="sans-serif" font-size="11" font-weight="bold" fill="#e8421a" letter-spacing="1.5">NDT PRODUCTS • UV-LIGHTS</text>
  
    
    <g transform="translate(0, 40)" filter="url(#soft-shadow)">
      <!-- UV Beam Glow -->
      <path d="M 270 250 L 700 80 L 700 420 Z" fill="url(#uv-beam-grad)" opacity="0.35"/>
      <path d="M 270 250 L 700 130 L 700 370 Z" fill="url(#uv-beam-glow)" opacity="0.5" filter="url(#glow)"/>
      
      <g filter="url(#glow)">
        <path d="M 600 200 L 620 205 L 610 220" fill="none" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
        <path d="M 640 280 L 660 270 L 650 300" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
        <circle cx="580" cy="260" r="5" fill="#fef08a"/>
      </g>
      
      <!-- Torch Body -->
      <rect x="40" y="225" width="130" height="50" rx="6" fill="url(#metal-body)" stroke="#0f172a" stroke-width="2"/>
      <rect x="50" y="230" width="25" height="40" rx="3" fill="#1e293b"/>
      <!-- rubber ridges -->
      <line x1="85" y1="225" x2="85" y2="275" stroke="#1e293b" stroke-width="4"/>
      <line x1="105" y1="225" x2="105" y2="275" stroke="#1e293b" stroke-width="4"/>

      <!-- Heat Sink Fins -->
      <rect x="170" y="210" width="50" height="80" rx="4" fill="url(#metal-body)" stroke="#0f172a" stroke-width="2"/>
      <line x1="180" y1="210" x2="180" y2="290" stroke="#0f172a" stroke-width="3"/>
      <line x1="190" y1="210" x2="190" y2="290" stroke="#0f172a" stroke-width="3"/>
      <line x1="200" y1="210" x2="200" y2="290" stroke="#0f172a" stroke-width="3"/>

      <!-- Head -->
      <path d="M 220 200 L 260 180 L 260 320 L 220 300 Z" fill="url(#metal-body)" stroke="#0f172a" stroke-width="2"/>
      <ellipse cx="260" cy="250" rx="6" ry="70" fill="#6d28d9" stroke="#c084fc" stroke-width="1.5"/>
      <path d="M 40 250 C 10 250 10 290 20 310" fill="none" stroke="#1e293b" stroke-width="6" stroke-linecap="round"/>
    </g>

    <defs>
      <linearGradient id="uv-beam-grad" x1="0%" y1="50%" x2="100%" y2="50%">
        <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.8"/>
        <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="uv-beam-glow" x1="0%" y1="50%" x2="100%" y2="50%">
        <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#5b21b6" stop-opacity="0"/>
      </linearGradient>
    </defs>
  </svg>